<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal San Gabriel | Acceso Seguro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; /* Azul muy oscuro estilo técnico */
            --accent: #d4af37;   /* Dorado institucional */
            --text-main: #f8fafc;
            --card-bg: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h2 { font-weight: 300; margin-bottom: 30px; letter-spacing: 1px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: #94a3b8; }
        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .footer-note {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>PORTAL GESTIÓN</h2>
        <div class="form-group">
            <label>USUARIO / DNI</label>
            <input type="text" placeholder="Ingrese su identificación">
        </div>
        <div class="form-group">
            <label>CONTRASEÑA</label>
            <input type="password" placeholder="••••••••">
        </div>
        <button>ACCEDER</button>
        <div class="footer-note">
            Plataforma segura para familias y docentes<br>
            Grupo Educativo San Gabriel
        </div>
    </div>

</body>
</html>
